version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: forms-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme
    volumes:
      - mongodb_data:/data/db
    networks:
      - forms-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forms-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Server
      PORT: 5000
      NODE_ENV: production

      # Database - connects to mongodb service
      MONGODB_URI: mongodb://admin:changeme@mongodb:27017/forms-db?authSource=admin

      # Auth
      JWT_SECRET: ${JWT_SECRET}

      # Frontend URL
      FRONTEND_URL: http://localhost:3000

      # Email (Gmail)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SHOP_EMAIL: ${SHOP_EMAIL}

      # WhatsApp (Twilio)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      TWILIO_INVITE_TEMPLATE_SID: ${TWILIO_INVITE_TEMPLATE_SID}

      # AWS S3 (Optional)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
    depends_on:
      - mongodb
    networks:
      - forms-network
    volumes:
      - ./backend/uploads:/app/uploads

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forms-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - forms-network

networks:
  forms-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
